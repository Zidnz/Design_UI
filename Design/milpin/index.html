<body>
<div id="root"></div>

<!-- 5. Root bootstrap -->
<script type="text/babel">
const { useState, useEffect } = React;

// ── Persist active tab across reloads ─────────
function usePersistentTab(defaultTab) {
  const [tab, setTab] = useState(() => {
    return localStorage.getItem('milpin_tab') || defaultTab;
  });
  function setTabPersisted(t) {
    setTab(t);
    localStorage.setItem('milpin_tab', t);
  }
  return [tab, setTabPersisted];
}

// ── Root ──────────────────────────────────────
function Root() {
  const [themeKey, setThemeKey] = useState(
    () => localStorage.getItem('milpin_theme') || 'default'
  );
  const [actor,   setActor]   = useState(0);
  const [mapZoom, setMapZoom] = useState(11);
  const [tweaks,  setTweaks]  = useState(false);

  const theme = { ...THEMES[themeKey], brown2: '#8C7F6E', card: '#FFFFFF' };

  // Persist theme
  useEffect(() => {
    localStorage.setItem('milpin_theme', themeKey);
  }, [themeKey]);

  // Tweaks bridge
  useEffect(() => {
    window.__setActor = (v) => setActor(parseInt(v));
    window.__setZoom  = (v) => setMapZoom(parseInt(v));

    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  return (
    <>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh' }}>
        <IOSDevice width={390} height={844} dark={false}>
          <IOSStatusBar dark={false} time="9:41"/>
          <div style={{ position:'absolute', top:62, left:0, right:0, bottom:0, overflow:'hidden' }}>
            <MilpinApp
              theme={theme}
              actor={actor}
              setActor={setActor}
              mapZoom={mapZoom}
            />
          </div>
        </IOSDevice>
      </div>

      <TweaksPanel
        visible={tweaks}
        themeKey={themeKey}
        setThemeKey={setThemeKey}
        actor={actor}
        setActor={setActor}
        mapZoom={mapZoom}
        setMapZoom={setMapZoom}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>

<!-- Tweak defaults for host persistence -->

</script>
